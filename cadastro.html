<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Pensão em Dia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="menu-superior">
        <h1>Pensão em Dia</h1>
    </header>

    <div class="container">
        <h1>Cadastro</h1>
        <form id="cadastroForm">
            <div class="form-group">
                <label for="cadastroNome">Nome Completo:</label>
                <input type="text" id="cadastroNome" required>
            </div>
            <div class="form-group">
                <label for="cadastroEmail">Email:</label>
                <input type="email" id="cadastroEmail" required>
            </div>
            <div class="form-group">
                <label for="cadastroPassword">Senha:</label>
                <input type="password" id="cadastroPassword" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar Senha:</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit">Cadastrar</button>
        </form>
        <p id="feedbackCadastro" class="feedback-message"></p>
        <p>Já tem uma conta? <a href="./index.html">Faça login aqui</a></p>
    </div>

    <!-- common.js inicializa o Firebase e exporta auth/db -->
    <script type="module" src="./common.js"></script>
    <!-- cadastro.js importa auth/db de common.js -->
    <script type="module" src="./cadastro.js"></script>
</body>
</html>
