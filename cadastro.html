<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cadastro de Usuário - Pensão em Dia</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="cadastro-container">
        <h2>Cadastro de Novo Usuário</h2>
        <form id="cadastroForm">
            <label for="cadastroNome">Nome</label>
            <input type="text" id="cadastroNome" name="nome" placeholder="Seu nome" required />

            <label for="cadastroSobrenome">Sobrenome</label>
            <input type="text" id="cadastroSobrenome" name="sobrenome" placeholder="Seu sobrenome" required />

            <label for="cadastroEmail">E-mail</label>
            <input type="email" id="cadastroEmail" name="email" placeholder="seu@email.com" required />

            <label for="cadastroSenha">Senha</label>
            <input type="password" id="cadastroSenha" name="senha" placeholder="Senha" required />

            <label for="cadastroConfirmarSenha">Confirmar Senha</label>
            <input type="password" id="cadastroConfirmarSenha" name="confirmarSenha" placeholder="Confirmar senha" required />

            <button type="submit">Cadastrar</button>
        </form>
        <div class="link-login">
            <p>Já tem conta? <a href="./index.html">Faça login aqui</a></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        
        const firebaseConfig = {
          apiKey: "AIzaSyADrEtzjmdX5A2yq_S5Hp0QzojAgWlClU4", // SEU API KEY
          authDomain: "pensaoemdiaapp.firebaseapp.com",
          projectId: "pensaoemdiaapp",
          storageBucket: "pensaoemdiaapp.firebasestorage.app",
          messagingSenderId: "322478168070",
          appId: "1:322478168070:web:494318199ac307c7868b87",
          measurementId: "G-WZ5ZGMWJJH"
        };
        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app); 
    </script>
    
    <script src="./cadastro.js" type="module"></script>
</body>
</html>
