<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Pensão em Dia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="menu-superior">
        <h1>Pensão em Dia</h1>
    </header>

    <div class="container">
        <h1>Cadastro</h1>
        <form id="cadastroForm">
            <div class="form-group">
                <label for="cadastroEmail">Email:</label>
                <input type="email" id="cadastroEmail" required>
            </div>
            <div class="form-group">
                <label for="cadastroPassword">Senha:</label>
                <input type="password" id="cadastroPassword" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar Senha:</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit">Cadastrar</button>
        </form>
        <p id="feedbackCadastro" class="feedback-message"></p>
        <p>Já tem uma conta? <a href="./index.html">Faça login aqui</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"; 
        
        const firebaseConfig = {
          apiKey: "AIzaSyADrEtzjmdX5A2yq_S5Hp0QzojAgWlClU4", // SEU API KEY
          authDomain: "pensaoemdiaapp.firebaseapp.com",
          projectId: "pensaoemdiaapp",
          storageBucket: "pensaoemdiaapp.firebasestorage.app",
          messagingSenderId: "322478168070",
          appId: "1:322478168070:web:494318199ac307c7868b87",
          measurementId: "G-WZ5ZGMWJJH"
        };
        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app); 
        window.db = getFirestore(app); 
    </script>
    <script src="./cadastro.js" type="module"></script>
</body>
</html>
