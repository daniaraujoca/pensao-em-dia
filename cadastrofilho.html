<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pensão em Dia - Cadastrar Filho</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="menu-superior">
        <span id="usuarioLogadoNome"></span>
        <button id="logoutBtn" class="btn-logout">Sair</button>
    </div>

    <div class="container">
        <h2>Cadastrar Novo Filho</h2>
        <form id="cadastroFilhoForm">
            <label for="nomeFilho">Nome Completo:</label>
            <input type="text" id="nomeFilho" required />

            <label for="dataNascimento">Data de Nascimento:</label>
            <input type="date" id="dataNascimento" required />

            <label for="pensaoMensal">Pensão Mensal (R$):</label>
            <input type="number" id="pensaoMensal" step="0.01" required />

            <label for="observacoes">Observações (Opcional):</label>
            <textarea id="observacoes" rows="4"></textarea>

            <button type="submit">Cadastrar Filho</button>
            <a href="gestao.html" class="btn-secundario">Voltar</a>
        </form>
        <div id="feedbackMessage" class="feedback-message" style="display: none;"></div>
    </div>

    <script type="module" src="common.js"></script>
    <script type="module" src="cadastrofilho.js"></script>
</body>
</html>
