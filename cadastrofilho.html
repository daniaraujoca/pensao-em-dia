<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pensão em Dia - Cadastro de Filho</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="menu-superior">
        <h1>Pensão em Dia</h1>
        <nav class="abas-navegacao">
            <a href="./cadastrofilho.html" class="aba">Cadastro de Filhos</a>
            <a href="./gestao.html" class="aba">Gestão de Pensão</a>
            <a href="./dicas.html" class="aba">Dicas</a>
        </nav>
        <span id="nomeUsuarioLogado" class="bem-vindo-usuario"></span>
        <button id="logoutBtn" class="logout-btn">Sair</button>
    </header>

    <div class="container">
        <h2>Cadastrar Novo Filho</h2>
        <form id="cadastroFilhoForm">
            <label for="nomeFilho">Nome do Filho(a):</label>
            <input type="text" id="nomeFilho" required />

            <label for="dataNascimento">Data de Nascimento:</label>
            <input type="date" id="dataNascimento" required />

            <label for="valorMensal">Valor Mensal da Pensão (R$):</label>
            <input type="number" id="valorMensal" step="0.01" required />

            <label for="diaVencimento">Dia do Vencimento (Dia do mês):</label>
            <input type="number" id="diaVencimento" min="1" max="31" required />

            <button type="submit">Cadastrar Filho</button>
        </form>
        <div id="feedbackCadastroFilho" class="feedback-message" style="display: none;"></div>
    </div>

    <script src="./common.js" type="module"></script>
    <script src="./cadastrofilho.js" type="module"></script>
</body>
</html>
