<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pensão em Dia - Gestão</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="menu-superior">
        <span id="usuarioLogadoNome"></span>
        <button id="logoutBtn" class="btn-logout">Sair</button>
    </div>

    <div class="container">
        <div class="header-gestao">
            <h1>Gestão da Pensão Alimentícia</h1>
            <div class="acoes-globais">
                <a href="cadastrofilho.html" class="btn-primario">Cadastrar Novo Filho</a>
                <a href="dicas.html" class="btn-secundario">Dicas Importantes</a>
            </div>
        </div>

        <div class="abas-navegacao">
            <button class="tab-button active" data-tab="filhos">Lista de Filhos</button>
            <button class="tab-button" data-tab="perfil">Seu Perfil</button>
        </div>

        <div id="filhosTab" class="tab-content active">
            <h3>Seus Filhos Cadastrados</h3>
            <div id="filhosContainer" class="filhos-container">
                <p id="loadingMessage">Carregando filhos...</p>
                </div>
        </div>

        <div id="perfilTab" class="tab-content">
            <h3>Informações do Seu Perfil</h3>
            <div id="perfilUsuarioContainer" class="perfil-usuario-container">
                <p><strong>Nome:</strong> <span id="perfilNome">Carregando...</span></p>
                <p><strong>Email:</strong> <span id="perfilEmail">Carregando...</span></p>
                <button id="editPerfilBtn" class="btn-primario">Editar Perfil</button>
                </div>
        </div>

        <div id="feedbackMessage" class="feedback-message" style="display: none;"></div>
    </div>

    <div id="pagamentoModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Registrar Pagamento</h2>
            <form id="pagamentoForm">
                <input type="hidden" id="modalFilhoId">
                <input type="hidden" id="modalMesAnoId">

                <label for="modalValorPago">Valor Pago (R$):</label>
                <input type="number" id="modalValorPago" step="0.01" required />

                <label for="modalDataPagamento">Data do Pagamento:</label>
                <input type="date" id="modalDataPagamento" required />

                <label for="modalMetodoPagamento">Método de Pagamento:</label>
                <select id="modalMetodoPagamento" required>
                    <option value="">Selecione...</option>
                    <option value="pix">PIX</option>
                    <option value="transferencia">Transferência Bancária</option>
                    <option value="dinheiro">Dinheiro</option>
                    <option value="deposito">Depósito</option>
                    <option value="outro">Outro</option>
                </select>

                <label for="modalObservacoesPagamento">Observações:</label>
                <textarea id="modalObservacoesPagamento" rows="3"></textarea>

                <div class="modal-buttons">
                    <button type="submit">Registrar Pagamento</button>
                    <button type="button" id="cancelPagamentoBtn" class="btn-secundario">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="common.js"></script>
    <script type="module" src="gestao.js"></script>
</body>
</html>
