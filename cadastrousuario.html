<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pensão em Dia - Cadastro de Usuário</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="menu-superior">
        <span id="usuarioLogadoNome"></span>
        <button id="logoutBtn" class="btn-logout">Sair</button>
    </div>

    <div class="container">
        <h2>Cadastre-se</h2>
        <form id="cadastroUsuarioForm">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required />

            <label for="email">Email:</label>
            <input type="email" id="email" required />

            <label for="password">Senha:</label>
            <input type="password" id="password" required />

            <label for="confirmPassword">Confirmar Senha:</label>
            <input type="password" id="confirmPassword" required />

            <button type="submit">Cadastrar</button>
            <p>Já tem uma conta? <a href="index.html">Faça login aqui</a></p>
        </form>
        <div id="feedbackMessage" class="feedback-message" style="display: none;"></div>
    </div>

    <script type="module" src="common.js"></script>
    <script type="module" src="cadastrousuario.js"></script>
</body>
</html>
