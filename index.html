<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pensão em Dia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="menu-superior">
        <h1>Pensão em Dia</h1>
    </header>

    <div class="container">
        <h1>Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        <p id="feedbackLogin" class="feedback-message"></p>
        <p>Não tem uma conta? <a href="./cadastro.html">Cadastre-se aqui</a></p>
        <p><a href="./recuperar-senha.html">Esqueceu sua senha?</a></p>
    </div>

    <!-- common.js inicializa o Firebase e exporta auth/db -->
    <script type="module" src="./common.js"></script>
    <!-- login.js importa auth/db de common.js -->
    <script type="module" src="./login.js"></script>
    
    <script>
        // Registrar Service Worker (mantido como está)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registrado com sucesso:', registration);
                    })
                    .catch(error => {
                        console.error('Falha no registro do Service Worker:', error);
                    });
            });
        }
    </script>
</body>
</html>
