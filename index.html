<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pensão em Dia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="menu-superior">
        <h1>Pensão em Dia</h1>
    </header>

    <div class="container">
        <h1>Login</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        <p id="feedbackLogin" class="feedback-message"></p>
        <p>Não tem uma conta? <a href="./cadastro.html">Cadastre-se aqui</a></p>
        <p><a href="./recuperar-senha.html">Esqueceu sua senha?</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"; 
        
        const firebaseConfig = {
          apiKey: "AIzaSyADrEtzjmdX5A2yq_S5Hp0QzojAgWlClU4", // SEU API KEY
          authDomain: "pensaoemdiaapp.firebaseapp.com",
          projectId: "pensaoemdiaapp",
          storageBucket: "pensaoemdiaapp.firebasestorage.app",
          messagingSenderId: "322478168070",
          appId: "1:322478168070:web:494318199ac307c7868b87",
          measurementId: "G-WZ5ZGMWJJH"
        };
        const app = initializeApp(firebaseConfig);
        window.auth = getAuth(app); 
        window.db = getFirestore(app); 
    </script>
    <script src="./login.js" type="module"></script>
    <script>
        // Registrar Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('Service Worker registrado com sucesso:', registration);
                    })
                    .catch(error => {
                        console.error('Falha no registro do Service Worker:', error);
                    });
            });
        }
    </script>
</body>
</html>
